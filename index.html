<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Tourloop - منصة تواصل اجتماعي عصرية" />
    <meta name="theme-color" content="#065F46" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#18191a" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title id="app-title">Tourloop | تورلوب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Cairo', 'sans-serif'],
            },
            colors: {
              fb: {
                blue: '#065F46', // Emerald 850 (Custom Dark Green)
                gray: '#F0F2F5',
                dark: '#242526',
                hover: '#F2F2F2',
                text: '#050505',
                textGray: '#65676B'
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --bg-image: url('https://i.ibb.co/8LX3Gq9m/Gemini-Generated-Image-iaqloliaqloliaql.png');
      }
      
      body {
        background-image: var(--bg-image);
        background-size: 100% 100%; /* لضمان عرض الصورة بالكامل دون قص */
        background-repeat: no-repeat;
        background-attachment: fixed; /* لتثبيت الخلفية عند التمرير */
        background-position: center;
        overflow-y: scroll;
        min-height: 100vh;
        /* Mobile Touch Optimization */
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      /* Dark Mode Background Enhancement */
      html.dark body {
        background-color: #18191a;
        background-image: var(--bg-image);
        background-blend-mode: overlay;
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      
      /* Custom Scrollbar for Chat & Modals */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }

      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: rgba(156, 163, 175, 0.5);
        border-radius: 20px;
      }

      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background-color: rgba(107, 114, 128, 0.8);
      }

      html.dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: rgba(75, 85, 99, 0.5);
      }

      html.dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background-color: rgba(156, 163, 175, 0.8);
      }
      
      /* Hide default password reveal button in Edge/IE to prevent double eyes */
      input::-ms-reveal,
      input::-ms-clear {
          display: none;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react/": "https://aistudiocdn.com/react@^19.2.0/",
          "react": "https://aistudiocdn.com/react@^19.2.0",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
          "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
          "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
          "vite": "https://aistudiocdn.com/vite@^7.2.4",
          "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1",
          "path": "https://aistudiocdn.com/path@^0.12.7",
          "dompurify": "https://esm.sh/dompurify@^3.3.1",
          "react-dom": "https://esm.sh/react-dom@^19.2.3"
        }
      }
    </script>
  </head>
  <body class="text-[#050505] dark:text-white transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
